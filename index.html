<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Option 2: Peer-Graded Submission and Evaluation</title>
<style>
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;color:#1a202c;line-height:1.6}
header{background:#2b6cb0;color:#fff;padding:2rem 1rem;text-align:center}
main{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
h1{margin:0;font-size:clamp(1.5rem,4vw,2.4rem)}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;margin:1.5rem 0}
figure{margin:0;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.ph{aspect-ratio:4/3;background:linear-gradient(135deg,#cbd5e0,#edf2f7);display:flex;align-items:center;justify-content:center;color:#4a5568}
figcaption{padding:.4rem .6rem;font-size:.85rem}
footer{text-align:center;padding:1.5rem;color:#718096;font-size:.85rem}
@media(max-width:480px){main{padding:1rem}}
</style>
</head>
<body>
<header><h1>Option 2: Peer-Graded Submission and Evaluation</h1><p>Responsive project submission</p></header>
<main>
<section><h2>About</h2><p>A responsive submission for the peer-reviewed assignment. The layout adapts to different screen sizes with a fluid grid and responsive image gallery.</p></section>
<section><h2>Gallery</h2><div class="gallery"><figure><div class="ph">Photo 1</div><figcaption>Item 1</figcaption></figure><figure><div class="ph">Photo 2</div><figcaption>Item 2</figcaption></figure><figure><div class="ph">Photo 3</div><figcaption>Item 3</figcaption></figure><figure><div class="ph">Photo 4</div><figcaption>Item 4</figcaption></figure><figure><div class="ph">Photo 5</div><figcaption>Item 5</figcaption></figure><figure><div class="ph">Photo 6</div><figcaption>Item 6</figcaption></figure></div></section>
</main>
<footer>Built for the course project.</footer>
</body>
</html>
